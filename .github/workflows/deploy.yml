name: Auto News Update and FTP Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
  repository_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytz feedparser

      - name: Run Python script and Verify files
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python main.py
          git add -f news.json index.html
          ls -la
          if [ ! -f news.json ]; then echo "news.json missing"; fi
          if [ ! -f index.html ]; then echo "index.html missing"; fi

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /web/jpnhack.xyz/gov-news-bot/
          local-dir: ./
          port: 21
          security: loose
          exclude: |
            main.py
            requirements.txt
            README.md
